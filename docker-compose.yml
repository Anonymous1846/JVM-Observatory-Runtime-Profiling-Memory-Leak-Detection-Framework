# ═══════════════════════════════════════════════════════════════════════════════
# Docker Compose for JVM Observatory local development
#
# WHY Kafka + Zookeeper:
#   The telemetry pipeline uses Kafka as its event transport. Kafka provides
#   durable, ordered, partitioned logs — ideal for high-throughput telemetry
#   where we need to decouple the JVMTI agent (producer) from the analysis
#   service (consumer) and support replay of historical events.
#
# WHY Zookeeper (not KRaft):
#   Confluent images 7.5.x still default to Zookeeper mode. KRaft mode is
#   production-ready in newer releases, but Zookeeper is simpler for local dev
#   and widely documented. Migrate to KRaft when upgrading to Confluent 7.6+.
#
# Usage:
#   docker-compose up -d        # start Kafka and Zookeeper
#   docker-compose down          # stop and remove containers
#   docker-compose down -v       # also remove volumes (clean slate)
# ═══════════════════════════════════════════════════════════════════════════════

version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      # WHY 2181: standard Zookeeper client port, hardcoded in most Kafka tutorials
      # and tooling. Changing it would break default configurations.
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      # WHY 9092: standard Kafka plaintext listener port.
      # Maps host:9092 → container:9092 so Java clients on the host
      # can connect to localhost:9092 without extra configuration.
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # WHY PLAINTEXT://localhost:9092: this is the address ADVERTISED to clients.
      # Clients connect to the advertised address, not the internal bind address.
      # Using "localhost" means only host-machine clients can connect — which is
      # exactly what we want for local development.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092

      # WHY replication factor 1: we only have one broker in local dev.
      # In production, this should be >= 3 for durability.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      # WHY auto-create topics: simplifies local dev by creating topics on first
      # produce/consume. In production, topics should be pre-created with explicit
      # partition counts and retention policies.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
